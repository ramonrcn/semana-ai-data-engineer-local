# ShopAgent — Docker infrastructure (Postgres + Qdrant + ShadowTraffic)
# Semana AI Data Engineer 2026 — Days 1-3 (100% local)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopagent}
      POSTGRES_USER: ${POSTGRES_USER:-shopagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopagent}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  shadowtraffic:
    image: shadowtraffic/shadowtraffic:2.4.2
    env_file:
      - ../.env
      - license.env
    volumes:
      - ./shadowtraffic.json:/home/config.json
      - ./data/reviews:/data/reviews
    command: ["--config", "/home/config.json"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
