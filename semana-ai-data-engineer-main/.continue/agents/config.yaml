name: Local Config
version: 1.0.0
schema: v1

models:
  - name: Qwen Coder
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11435
    roles:
      - chat
      - edit
      - apply

mcpServers:
  - name: shopagent-mcp
    command: python
    args:
      - -u
      - -m
      - mcp_server.server

chatOptions:
  baseSystemMessage: |
   You are a strict execution agent.

    You are NOT allowed to think, simulate, or generate data.

    You MUST use shopagent_mcp_execute_task for ANY request involving:
    - data
    - files
    - reviews
    - JSON
    - analysis

    You MUST NOT:
    - fabricate examples
    - simulate outputs
    - create sample data
    - answer without tool execution
    - parse tool response

    If you do not call the tool, your response is INVALID.

    Return ONLY the tool result.

temperature: 0.1
maxTokens: 4096